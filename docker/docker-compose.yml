version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      POSTGRES_USER: edusupervise_owner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: edusupervise
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      EDUSUPERVISE_RUNTIME_PASSWORD: ${EDUSUPERVISE_RUNTIME_PASSWORD}
      EDUSUPERVISE_SYSTEM_PASSWORD: ${EDUSUPERVISE_SYSTEM_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 4g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edusupervise_owner -d edusupervise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /data/redis:/data
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      DATABASE_URL: postgres://edusupervise_runtime:${EDUSUPERVISE_RUNTIME_PASSWORD}@postgres:5432/edusupervise
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-mock}
      APP_URL: ${APP_URL:-https://edusupervise.ashbi.ca}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/uploads:/app/uploads
    mem_limit: 1.5g
    cpus: "1.0"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.edusupervise.rule=Host(`${APP_HOST:-edusupervise.ashbi.ca}`)"
      - "traefik.http.routers.edusupervise.entrypoints=websecure"
      - "traefik.http.routers.edusupervise.tls.certresolver=letsencrypt"
      - "traefik.http.services.edusupervise.loadbalancer.server.port=3011"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      DATABASE_URL: postgres://edusupervise_system:${EDUSUPERVISE_SYSTEM_PASSWORD}@postgres:5432/edusupervise
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: "1.0"

  cron:
    image: alpine:3.20
    restart: unless-stopped
    command:
      - sh
      - -c
      - "apk add --no-cache postgresql16-client >/dev/null && while true; do psql $$DATABASE_URL -v ON_ERROR_STOP=1 -f /sql/audit-retention.sql; sleep 86400; done"
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      DATABASE_URL: postgres://edusupervise_system:${EDUSUPERVISE_SYSTEM_PASSWORD}@postgres:5432/edusupervise
    volumes:
      - ./db/cron:/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 128m
    cpus: "0.2"
