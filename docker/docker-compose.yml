version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      POSTGRES_USER: edusupervise_owner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: edusupervise
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
      EDUSUPERVISE_RUNTIME_PASSWORD: ${EDUSUPERVISE_RUNTIME_PASSWORD}
      EDUSUPERVISE_SYSTEM_PASSWORD: ${EDUSUPERVISE_SYSTEM_PASSWORD}
    volumes:
      - /data/postgres:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    mem_limit: 4g
    cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edusupervise_owner -d edusupervise"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - /data/redis:/data
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    # Expose 3011 on the host loopback so Traefik (running in host network
    # mode) can reach it. Without this, the container is only reachable
    # via the docker bridge network and Traefik's `http://127.0.0.1:3011`
    # target fails.
    ports:
      - "127.0.0.1:3011:3011"
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      DATABASE_URL: postgres://edusupervise_runtime:${EDUSUPERVISE_RUNTIME_PASSWORD}@postgres:5432/edusupervise
      # SYSTEM_DATABASE_URL is the BYPASSRLS role used by signup + login
      # for cross-tenant bootstrap (creating a brand-new school + first
      # user, looking up a user by email before school_id is known). The
      # web container needs BOTH: DATABASE_URL for normal request handling
      # (runtime role, FORCE RLS) and SYSTEM_DATABASE_URL for the
      # cross-tenant auth surface (system role, BYPASSRLS).
      SYSTEM_DATABASE_URL: postgres://edusupervise_system:${EDUSUPERVISE_SYSTEM_PASSWORD}@postgres:5432/edusupervise
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-mock}
      APP_URL: ${APP_URL:-https://edusupervise.ashbi.ca}
      # SECURITY (audit S-S2): Traefik is the sole ingress for this app
      # and sets X-Forwarded-For on every forwarded request. Trusting
      # XFF on a direct connection would let attackers spoof their IP
      # to evade the per-IP login throttle (apps/web/server/rate-limit.server.ts).
      # When TRUST_PROXY=1, apps/web/server/client-ip.server.ts reads
      # the leftmost XFF entry (= original client). Default off; flip
      # to 1 here because Traefik is the documented ingress.
      TRUST_PROXY: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - /data/uploads:/app/uploads
      # Audit B12 (2026-07-04): expose the textfile-collector
      # dir so the metrics route can read the backup-freshness
      # stamp written by deploy/backup.sh. Read-only because the
      # web process is not the source of truth for these files.
      - /var/lib/node_exporter:/var/lib/node_exporter:ro
    mem_limit: 1.5g
    cpus: "1.0"
    healthcheck:
      # Hit the JSON health endpoint. Traefik would surface 502s but a
      # wedged Node process serving only stale connections would not —
      # so we curl directly inside the container network.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3011/api/health | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.edusupervise.rule=Host(`${APP_HOST:-edusupervise.ashbi.ca}`)"
      - "traefik.http.routers.edusupervise.entrypoints=websecure"
      - "traefik.http.routers.edusupervise.tls.certresolver=letsencrypt"
      - "traefik.http.services.edusupervise.loadbalancer.server.port=3011"
      # audit slice-5 R-18: enable gzip/brotli compression on the proxy.
      # The middleware is defined in /etc/traefik/dynamic/middlewares.yml.
      - "traefik.http.routers.edusupervise.middlewares=compress-everything@file"

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      DATABASE_URL: postgres://edusupervise_system:${EDUSUPERVISE_SYSTEM_PASSWORD}@postgres:5432/edusupervise
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-mock}
      SMS_PROVIDER: ${SMS_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 1g
    cpus: "1.0"
    healthcheck:
      # The worker has no HTTP endpoint. Probe Postgres + Redis via
      # the same node runtime that already includes ioredis + pg
      # (no need to bundle postgresql-client just for pg_isready).
      test:
        - CMD-SHELL
        - node -e "const p=require('postgres');const c=p(process.env.DATABASE_URL);c.unsafe('SELECT 1').then(()=>process.exit(0)).catch(()=>process.exit(1))"
        - node -e "const R=require('ioredis');const c=new R(process.env.REDIS_URL);c.ping().then(r=>process.exit(r==='PONG'?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cron:
    image: alpine:3.20
    restart: unless-stopped
    # Runs both daily SQL jobs back-to-back. Splitting into a loop-of-two
    # would be tidier but the alpine container's `apk add` runs on every
    # boot anyway, so a single `while true` + chained `-f` is the smallest
    # change. psql applies each SQL file in its own implicit transaction
    # so a failure in plan-downgrade.sql does NOT block audit-retention.sql.
    #
    # Slice-6 finding: plan-downgrade.sql was on the volume but never
    # executed → silent revenue leak (paid subs never auto-flip after the
    # 7-day grace). Now both nightly SQLs run.
    command:
      - sh
      - -c
      - "apk add --no-cache postgresql16-client >/dev/null && while true; do psql $$DATABASE_URL -v ON_ERROR_STOP=1 -f /sql/audit-retention.sql && psql $$DATABASE_URL -v ON_ERROR_STOP=1 -f /sql/plan-downgrade.sql; sleep 86400; done"
    env_file:
      - ${EDUSUPERVISE_SECRETS_DIR:-/root/edusupervise-secrets}/.env
    environment:
      DATABASE_URL: postgres://edusupervise_system:${EDUSUPERVISE_SYSTEM_PASSWORD}@postgres:5432/edusupervise
    volumes:
      - ./db/cron:/sql:ro
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 128m
    cpus: "0.2"
    healthcheck:
      # Cron is a sleep-loop; just confirm Postgres is still reachable.
      # If it's not, the next nightly SQL run will fail loudly anyway,
      # but a healthcheck surfaces the outage faster.
      test: ["CMD-SHELL", "pg_isready -h postgres -p 5432 -d edusupervise"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
