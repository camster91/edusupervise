version: 1
plan:
  name: 'EduSupervise Tier 1 build'
  max_concurrency: 6
  max_consecutive_failures: 2
  max_cycles: 8
  auto_reject_retries: 1
  verifier_config:
    default_verifiers: [verifier]
    audit_sample_rate: 0.0

# Tier 1 ships a working multi-tenant SaaS at edusupervise.ashbi.ca with the
# 21 acceptance criteria in spec section 19 verified. Spec is the source of
# truth: docs/superpowers/specs/2026-06-28-edusupervise-rebuild.md.
#
# Sequencing: foundation -> schema -> auth-rls -> (billing + worker + frontend-shell)
#   -> (frontend-duties + frontend-reminders + frontend-admin + devops-deploy)
#   -> final-integration

tasks:

  # ============================================================
  # Layer 0 — foundation (no deps)
  # ============================================================

  - id: provider-adapters
    title: 'provider-adapters: email, SMS, billing wrappers with mock+real implementations'
    prompt: |
      Build provider adapter packages so the rest of the system can be developed and
      tested without real API keys, then swapped to real providers via env var at
      production time.

      Deliverables:

      1. `packages/email/src/index.ts` — exports `sendEmail({to, subject, body, html})`:
         - Reads `EMAIL_PROVIDER` env var (`'mock'` | `'resend'`). Default: `'mock'`.
         - Mock impl: logs `{to, subject, body}` to stdout (pino structured log), returns
           `{providerId: 'mock-<uuid>', status: 'sent'}`. Appends to `/data/mocks/emails.log`.
         - Real impl: uses `resend` SDK (already in spec stack ~4.0) to send via Resend API.
           Reads `RESEND_API_KEY` and `RESEND_FROM_EMAIL` from env.
      2. `packages/email/src/templates/DutyReminder.tsx` — react-email component for the
         reminder email. Subject: "Reminder: <duty.location> at <time>". Body includes
         school name, duty location, time (in school timezone), time-until (e.g., "in 15
         minutes"), and a custom message if provided. Both mock and real send via this
         template.
      3. `packages/sms/src/index.ts` — exports `sendSms({to, body})`:
         - Reads `SMS_PROVIDER` env var (`'mock'` | `'twilio'`). Default: `'mock'`.
         - Mock impl: logs `{to, body}` to stdout and appends to `/data/mocks/sms.log`,
           returns `{providerId: 'mock-<uuid>', status: 'sent'}`.
         - Real impl: uses `twilio` SDK. Reads `TWILIO_ACCOUNT_SID`, `TWILIO_AUTH_TOKEN`,
           `TWILIO_FROM_NUMBER` from env.
      4. `packages/billing-adapter/src/index.ts` — exports Stripe helpers, but with a
         mock layer:
         - `createCheckoutSession({schoolId, plan})` — mock returns a fake Stripe Checkout
           URL (`http://localhost:3000/mock-stripe?session=cs_test_<uuid>&plan=<plan>`),
           real returns a real Stripe Checkout URL.
         - `createPortalSession({schoolId})` — mock returns `http://localhost:3000/mock-stripe/portal`,
           real returns the real Stripe portal URL.
         - `verifyWebhook(rawBody, signature)` — mock accepts any payload with a
           `X-Mock-Signature: mock` header, real uses `STRIPE_WEBHOOK_SECRET`.
         - Reads `BILLING_PROVIDER` env var (`'mock'` | `'stripe'`). Default: `'mock'`.
      5. `packages/email/src/__mocks__/emails.log`, `packages/sms/src/__mocks__/sms.log` —
         .gitkeep'd directories where mocks append. Add to .gitignore.
      6. Tests `packages/email/src/send.test.ts`, `packages/sms/src/send.test.ts`,
         `packages/billing-adapter/src/index.test.ts` — verify mock impls log to the
         correct files and return the correct shape; verify real impls are properly
         wired (mock the SDK at the test level for the real impl).
      7. Update `package.json` to include `@edusupervise/email`, `@edusupervise/sms`,
         `@edusupervise/billing-adapter` workspaces.

      Stop condition: `EMAIL_PROVIDER=mock pnpm --filter @edusupervise/email test` passes,
      `SMS_PROVIDER=mock pnpm --filter @edusupervise/sms test` passes,
      `BILLING_PROVIDER=mock pnpm --filter @edusupervise/billing-adapter test` passes.
      Switching `EMAIL_PROVIDER=resend` (no real key) fails fast with a clear error
      "RESEND_API_KEY required".
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      Verify the provider-adapters:
      1. Confirm `EMAIL_PROVIDER=mock` is the default and works without any API keys set.
      2. Confirm `EMAIL_PROVIDER=resend` without RESEND_API_KEY throws a clear error
         (not a generic SDK error).
      3. Confirm mock impl writes to `/data/mocks/emails.log` and `/data/mocks/sms.log`
         (or equivalent) and the .gitignore excludes these.
      4. Run `pnpm --filter @edusupervise/email test` and confirm tests pass.
      5. Run `pnpm --filter @edusupervise/sms test` and confirm tests pass.
      6. Run `pnpm --filter @edusupervise/billing-adapter test` and confirm tests pass.
      7. Confirm the react-email DutyReminder template renders without errors when given
         sample inputs.

      FAIL with the specific element if any check fails. PASS only if all seven pass.
    max_retries: 2

  - id: foundation
    title: 'foundation: docker-compose, three Postgres roles, secrets layout, Traefik snippet'
    prompt: |
      Build the EduSupervise infrastructure foundation. Read the spec at
      docs/superpowers/specs/2026-06-28-edusupervise-rebuild.md sections 2, 4 (init scripts),
      13 (deploy) carefully before writing anything.

      Deliverables (all in repo, committed with conventional-commit messages):

      1. `docker/docker-compose.yml` — four services (postgres, redis, web, worker) plus the
         cron container from spec section 6 audit retention. Use mem_limit + cpus from
         spec section 13. Use environment variables for DATABASE_URL with separate
         edusupervise_runtime URL for web and edusupervise_system URL for worker.
      2. `docker/Dockerfile.web` — multi-stage: install pnpm, copy package.json, install,
         copy source, run `pnpm build` (RR7 production build), serve via @react-router/serve.
      3. `docker/Dockerfile.worker` — slim Node 20, copies `worker/` and `db/` from web
         build artifacts, runs `node worker/index.js`.
      4. `db/init/01-roles.sql` — creates `edusupervise_owner` (POSTGRES_USER), then
         `edusupervise_runtime` (no superuser, no BYPASSRLS, grants on existing tables after
         schema runs) and `edusupervise_system` (no superuser, BYPASSRLS, grants on system
         tables only).
      5. `db/init/02-schema.sql` — runs the schema from spec section 4 verbatim. Use the
         DO block for the per-table ENABLE + FORCE + POLICY loop.
      6. `db/init/03-seed.sql` — seeds `plan_limits` from spec section 4. NO demo school in
         init script — that comes from `pnpm db:seed` after first boot.
      7. `deploy/traefik/edusupervise.yml` — Traefik dynamic router snippet matching spec
         section 13 compose labels. Host `edusupervise.ashbi.ca`, entrypoint `websecure`,
         TLS via letsencrypt.
      8. `package.json` (root) — pnpm workspace with `apps/web`, `apps/worker`, `packages/db`,
         `packages/schemas`. Pinned dependencies per spec section 3 (better-auth ~1.6.14,
         drizzle-orm ~0.36, react-router ~7.1, etc.).
      9. `pnpm-workspace.yaml`, `.npmrc`, `tsconfig.base.json` — strict TS, ESM,
         `"moduleResolution": "Bundler"`.
      10. `docs/runbooks/restore.md` — restore procedure from a pg_dump file, including
          the role-recreate step (roles are in init scripts, not pg_dump).

      Each Dockerfile must build cleanly via `docker build`. The compose file must pass
      `docker compose -f docker/docker-compose.yml config` validation. DO NOT start the
      stack — that's later.

      Stop condition: all files committed, `docker compose config` exits 0, pnpm install
      succeeds at the workspace root.
    assigned_to: coder
    verified_by: verifier
    verify_prompt: |
      Verify the foundation deliverable independently:
      1. Run `docker compose -f docker/docker-compose.yml config` and confirm exit 0.
      2. Read each init SQL file; confirm roles are created with the right BYPASSRLS
         attribute (edusupervise_runtime should NOT have BYPASSRLS; edusupervise_system
         SHOULD).
      3. Confirm FORCE ROW LEVEL SECURITY appears on every tenant table in 02-schema.sql.
      4. Confirm every dependency in package.json matches the spec's pinned versions
         (especially better-auth ~1.6.14, NOT ^1.0).
      5. Confirm mem_limit and cpus are present on every service in compose.
      6. Confirm the Traefik snippet uses Host(`edusupervise.ashbi.ca`) and entrypoint websecure.

      FAIL with the specific missing element if any check fails. PASS only if all six pass.
    max_retries: 2

  # ============================================================
  # Layer 1 — schema (depends on foundation)
  # ============================================================

  - id: db-schema
    title: 'db-schema: Drizzle schema, migrations, seed, audit-retention SQL'
    prompt: |
      Build the database layer. Read spec section 4 (data model) carefully. The init SQL
      already runs from foundation; this task produces the TypeScript Drizzle layer that
      mirrors it.

      Deliverables:

      1. `packages/db/src/schema.ts` — Drizzle table definitions matching spec section 4
         exactly. Use `pgTable` with uuid PKs, foreign keys with cascade delete, check
         constraints (length caps, time ordering, enum checks). Export types: School, User,
         Duty, DutyAssignment, Reminder, ReminderLog, AuditLog, StripeEvent, Outbox,
         WorkerHeartbeat, Notification, PlanLimit, CycleCalendar.
      2. `packages/db/src/client.ts` — Drizzle client factory. Exports two clients:
         `getRuntimeClient(databaseUrl)` (uses runtime role) and `getSystemClient(databaseUrl)`
         (uses system role). Both take a connection string; the caller chooses.
      3. `packages/db/src/rls.ts` — `withSchoolContext(client, schoolId, fn)` helper that
         opens a transaction and runs `SET LOCAL app.school_id = ${schoolId}` before
         invoking `fn(tx)`. Type-safe: `fn` receives a transaction-scoped client.
      4. `packages/db/migrations/` — drizzle-kit generated SQL. Run `pnpm db:generate`
         and commit the output. Migrations must be reversible.
      5. `packages/db/src/seed.ts` — seeds `plan_limits` (already in init SQL — make this
         idempotent), creates one demo school (`Maple Elementary`, slug `maple-elementary`,
         school_year_start = first Monday of September of current year, school_year_end =
         +10 months, cycle_days = 5), one school_admin user (`admin@maple.test` /
         `password123`), and 4 duties matching the original Replit demo data (Main Entrance
         08:30, Playground 15:15, Cafeteria 12:30, Sports Field 11:45). Document that
         this seed is for dev only and must not run in production.
      6. `db/cron/audit-retention.sql` — the SQL from spec section 6, plus a 1-line comment
         header.
      7. `packages/db/src/cycle-math.ts` — exports `cycleDayForDate(date, school, calendarEntry?)`
         exactly as defined in spec section 12. Include unit tests in
         `packages/db/src/cycle-math.test.ts` covering: school-year start, school-year end,
         day before start (returns null), day after end (returns null), leap year Feb 29,
         calendar entry override, non-school-day override (cycle_day null), 14-month cap
         boundary.
      8. Root `package.json` adds scripts: `db:generate`, `db:migrate`, `db:seed`,
         `db:reset` (drops + migrates + seeds).

      Verification: run `pnpm db:generate && pnpm db:migrate && pnpm db:seed` against a
      throwaway local Postgres if available. If no local Postgres, document the verification
      commands the verifier should run on first deployment.

      Stop condition: schema compiles, types are exported, cycle-math tests pass with
      vitest, all files committed.
    assigned_to: coder
    depends_on: [foundation]
    verified_by: verifier
    verify_prompt: |
      Independently verify the database layer:
      1. Read `packages/db/src/schema.ts` and confirm every table from spec section 4 is
         present with the right columns + constraints. Pay attention to:
         - audit_log has BIGSERIAL id and nullable user_id
         - reminder_log has UNIQUE(reminder_id, scheduled_for, channel)
         - outbox has the partial index `WHERE enqueued_at IS NULL`
         - notifications has the partial index `WHERE read_at IS NULL`
         - cycle_calendar has length(note) <= 500 CHECK
         - duty_assignments has CHECK (end_date IS NULL OR end_date >= start_date)
         - schools has both school_year_start AND school_year_end with the 14-month cap
      2. Read `packages/db/src/rls.ts` and confirm `withSchoolContext` does
         SET LOCAL inside transaction.
      3. Read `packages/db/src/cycle-math.ts` and confirm it matches the spec algorithm.
      4. Run `pnpm --filter @edusupervise/db test cycle-math` and confirm vitest passes.
      5. Confirm `db/cron/audit-retention.sql` matches the spec SQL verbatim.

      FAIL with the specific element if any check fails. PASS only if all five pass.
    max_retries: 2

  # ============================================================
  # Layer 2 — auth + RLS (depends on schema)
  # ============================================================

  - id: auth-rls
    title: 'auth-rls: better-auth, sessions, CSRF, password reset, magic link, RLS-aware Drizzle wrapper'
    prompt: |
      Build authentication and the RLS-aware data access layer. Read spec sections 4, 5, 7
      carefully.

      Deliverables:

      1. `apps/web/server/auth.server.ts` — better-auth ~1.6.14 config. Methods: email/password
         (bcrypt 12 rounds), magic link (consumed via POST), Google OAuth, Microsoft OAuth.
         Use better-auth's Drizzle adapter pointed at the `users`, `sessions`, `accounts`,
         `verification` tables (let better-auth manage its own tables, but they live in the
         same DB). Sessions cookie: `__Host-edusupervise.session`, HttpOnly, Secure (prod),
         SameSite=Lax, 30-day rolling.
      2. `apps/web/server/csrf.server.ts` — CSRF validation. Reads `__Host-edusupervise.csrf`
         cookie and `x-csrf-token` header (or form body field for RR7 actions). Uses
         `crypto.timingSafeEqual`. Sets the cookie on first GET. Rotates on login.
      3. `apps/web/server/db.server.ts` — exports `getDb()` that returns the runtime Drizzle
         client. Wraps queries in `withSchoolContext` based on the authenticated session's
         `schoolId`. Provides `getCurrentUser()` and `getCurrentSchool()` helpers used by
         loaders.
      4. `apps/web/app/lib/csrf.ts` — client-side: reads the cookie, attaches to every
         mutation fetch via `x-csrf-token` header. Used by `app/lib/api.ts`.
      5. `apps/web/app/routes/login.tsx`, `signup.tsx`, `forgot.tsx`, `reset.tsx`,
         `auth.magic.tsx` (POST), `verify-email.tsx` (POST), `verify-phone.tsx` — all auth
         flows per spec section 5 + 7. Use react-hook-form + Zod.
      6. `apps/web/server/rate-limit.server.ts` — in-memory rate limiter for login
         (5/15min/IP), forgot (3/hr/email), magic link (5/hr/email), phone verify (5/hr/phone).
         Per-process; sufficient for single-instance Tier 1. Document that multi-instance
         requires Redis-backed rate limiter (Tier 2).
      7. Integration tests in `tests/integration/auth-rls.test.ts` using vitest + supertest
         against a test Postgres:
         - signup creates school + first admin
         - login returns Set-Cookie with __Host-edusupervise.session
         - logout clears session
         - password reset flow end-to-end
         - magic link POST consumption
         - RLS: user from school A cannot read school B's rows on every tenant table
         - CSRF: cross-origin POST returns 403
         - rate limit: 6th login attempt in 15min returns 429

      Verification: integration tests must pass via `pnpm test:integration`.

      Stop condition: auth routes render, login + signup work end-to-end against a test DB,
      all integration tests pass.
    assigned_to: coder
    depends_on: [db-schema]
    verified_by: verifier
    verify_prompt: |
      Adversarial verification of auth + RLS:
      1. Read `apps/web/server/auth.server.ts` — confirm better-auth is pinned to ~1.6.x,
         NOT ^1.0.
      2. Read `apps/web/server/csrf.server.ts` — confirm timing-safe compare, NO age-based
         rejection (the double-submit pattern is stateless).
      3. Read `apps/web/server/db.server.ts` — confirm `withSchoolContext` wraps every
         query that touches tenant data.
      4. Read integration tests — confirm the RLS test creates TWO schools and verifies
         school A cannot see school B's data on every tenant table, not just one.
      5. Run `pnpm --filter @edusupervise/web test:integration -- auth-rls` and confirm
         all tests pass.
      6. Read magic link + verify-email + reset routes — confirm they use POST, not GET,
         for token consumption (no Referer leak).

      FAIL with the specific element if any check fails. PASS only if all six pass.
    max_retries: 2

  # ============================================================
  # Layer 3 — three parallel tracks after auth-rls
  # ============================================================

  - id: billing
    title: 'billing: Stripe products, checkout, webhooks, plan enforcement, downgrade grace'
    prompt: |
      Build the billing layer. Read spec sections 6, 7 (Billing subsection), and 19 (acceptance
      criteria 1413) carefully.

      Deliverables:

      1. `apps/web/server/billing.server.ts` — Stripe ~17.0.0 client wrapped via
         `@edusupervise/billing-adapter`. Helpers: `createCheckoutSession(schoolId, plan)`,
         `createPortalSession(schoolId)`, `handleWebhookEvent(event)` (verifies signature,
         opens transaction, INSERTs into stripe_events for dedup, applies state change
         in same transaction).
      2. `apps/web/app/routes/api.billing.checkout.tsx` — POST action. Creates session,
         returns 303 redirect.
      3. `apps/web/app/routes/api.billing.portal.tsx` — POST action. Returns portal URL.
      4. `apps/web/app/routes/api.billing.webhook.tsx` — POST resource route. NO CSRF
         (signature verified instead). Idempotent via stripe_events UNIQUE(id).
      5. `apps/web/app/routes/api.billing.invoices.tsx` — GET, returns invoices for school.
      6. `apps/web/app/routes/api.billing.audit-export[.csv].tsx` — GET, CSV download of
         audit_log for the school (used during downgrade grace).
      7. `apps/web/server/plan-enforcement.server.ts` — `enforcePlanLimits(schoolId, action)`
         helper. Checks the relevant limit (max_teachers for user.create, max_duties for
         duty.create, etc.) and returns 403 with `{error: 'plan_limit_exceeded', ...}` body
         shape if exceeded.
      8. Downgrade grace workflow:
         - On `customer.subscription.deleted` webhook from Pro/School → Free: set
           `schools.plan_downgrade_pending_to = 'free'`, `plan_downgrade_effective_at = now() + 7 days`
         - Daily cron (in cron container) checks `plan_downgrade_effective_at <= now()` and
           if so, sets `schools.plan = 'free'` and clears the pending fields
         - During grace: render `<DowngradeBanner>` at top of all admin pages with countdown
         - During grace: "Export audit CSV" button visible at `/app/settings/billing`
      9. `<DowngradeBanner>` component in `apps/web/app/components/billing/`.
      10. Integration test `tests/integration/billing.test.ts`:
          - Stripe test-mode checkout (mocked) upgrades trial → Pro
          - Same `event.id` fired twice results in one state change
          - Plan limit hit returns 403 with correct body
          - Pro→Free sets plan_downgrade_pending_to; banner rendered; export available;
            after 7 days (advance time in test), plan flips to free

      Stop condition: Stripe test mode checkout works end-to-end against the test Postgres,
      webhook handler is idempotent, plan enforcement returns 403 with correct body, all
      integration tests pass.
    assigned_to: coder
    depends_on: [auth-rls, provider-adapters]
    verified_by: verifier
    verify_prompt: |
      Adversarial verification of billing:
      1. Confirm Stripe SDK is pinned to ~17.x, NOT ^17.0.0.
      2. Read webhook handler — confirm it opens a transaction, inserts into stripe_events
         BEFORE applying state change (so a failed state change rolls back the dedup row).
      3. Read plan-enforcement — confirm response is 403 with body
         `{error: 'plan_limit_exceeded', limit, current, max, upgrade_url}`.
      4. Run integration tests and confirm all pass.
      5. Read downgrade grace logic — confirm the 7-day window is enforced (banner shown,
         audit export available, plan only flips after effective_at).
      6. Confirm DowngradeBanner component is wired into the app shell layout, not a
         separate page.

      FAIL with the specific element if any check fails. PASS only if all six pass.
    max_retries: 2

  - id: worker
    title: 'worker: BullMQ producer (outbox flusher), reminder dispatch, retry, heartbeat, notification insert'
    prompt: |
      Build the reminder worker. Read spec sections 2, 10, and 12 (worker narrative + cycle math)
      carefully.

      Deliverables:

      1. `apps/worker/src/index.ts` — worker entrypoint. Connects to Postgres as
         edusupervise_system. Starts BullMQ Worker on `reminders` queue with concurrency 5.
      2. `apps/worker/src/heartbeat.ts` — writes to `worker_heartbeats` every 30s via
         INSERT ... ON CONFLICT (worker_id) DO UPDATE.
      3. `apps/worker/src/jobs/outbox-flush.ts` — runs every 5s. Reads outbox rows where
         `enqueued_at IS NULL`, enqueues BullMQ jobs, marks `enqueued_at = now()`.
      4. `apps/worker/src/jobs/reminders.ts` — BullMQ processor for `reminder.dispatch`
         jobs. Validates payload via Zod (`{schoolId, reminderId, assignmentId, userId,
         channel, scheduledFor}`). On invalid payload, marks job failed with
         `error: 'invalid_payload'`. On valid payload: opens transaction, sets
         `SET LOCAL app.school_id = job.schoolId`, reads assignment + user + school,
         calls `sendEmail()` from `@edusupervise/email` and/or `sendSms()` from
         `@edusupervise/sms` (both packages are mock-by-default; switch to real via env),
         writes reminder_log row with status.
      5. `apps/worker/src/retry-policy.ts` — BullMQ retry config: 1m, 5m, 30m, 2h, 12h.
         After 5 attempts, the worker writes:
         - `reminder_log.status = 'failed'` with the error message
         - `audit_log` row with action='reminder.failed'
         - `notifications` row with kind='reminder.failed', user_id=job.userId,
           title='Reminder failed to send', body=<error>, link_url='/app/reminders'
      6. `apps/worker/src/timezone.ts` — converts duty's local start_time (HH:MM) + school
         timezone (IANA string) to UTC for `dispatch_at` calculation. Uses Intl.DateTimeFormat
         with the school's timezone.
      7. Integration tests `tests/integration/worker.test.ts`:
         - Valid job dispatches and writes reminder_log
         - Invalid payload (missing schoolId) is rejected before any DB write
         - 5 consecutive failures mark reminder_log as failed, write audit_log + notification
         - Worker writes reminder_log for school A; school B user cannot read it (RLS check)
         - Two concurrent jobs for different schools write to correct school_id
         - Heartbeat row is created and updated
      8. `apps/web/server/queue.server.ts` — server-side BullMQ producer. Inserts outbox
         row in same transaction as the reminder mutation. The outbox-flush worker job
         picks it up. (This file lives in web/ but is imported by both web mutations and
         worker initialization.)

      Verification: integration tests must pass against test Postgres + Redis.

      Stop condition: worker connects, heartbeat works, valid dispatch fires, invalid
      payload rejected, retry policy writes notification on final failure, all
      integration tests pass.
    assigned_to: coder
    depends_on: [auth-rls, provider-adapters]
    verified_by: verifier
    verify_prompt: |
      Adversarial verification of the worker:
      1. Confirm the worker connects to Postgres ONCE on startup as edusupervise_system
         (not runtime).
      2. Confirm every DB write is wrapped in a transaction that runs
         `SET LOCAL app.school_id = job.schoolId`.
      3. Confirm the Zod payload validation rejects jobs missing schoolId BEFORE any
         DB write.
      4. Confirm the retry policy writes notifications + audit_log + reminder_log on
         final failure (5 attempts).
      5. Confirm heartbeat uses INSERT ... ON CONFLICT (worker_id) DO UPDATE.
      6. Run `pnpm --filter @edusupervise/worker test:integration` and confirm all tests pass.
      7. Confirm timezone conversion uses Intl.DateTimeFormat, not manual offset math.

      FAIL with the specific element if any check fails. PASS only if all seven pass.
    max_retries: 2

  - id: frontend-shell
    title: 'frontend-shell: RR7 setup, app shell, sidebar/topbar, auth flow UI, theming'
    prompt: |
      Build the frontend foundation: React Router 7 setup, authenticated layout shell,
      theming infrastructure. Read spec sections 8 (frontend routes), 9 (components), 11
      (theming) carefully.

      Deliverables:

      1. `apps/web/app/root.tsx` — RR7 root with theme CSS variable, global error boundary.
      2. `apps/web/app/entry.server.tsx` — wraps each request in pino child logger with
         requestId, reads LOG_LEVEL from env.
      3. `apps/web/app/entry.client.tsx` — hydration entry.
      4. `apps/web/app/routes/_app.tsx` — authenticated layout. Loader reads current user
         + school from session. Renders Sidebar + Topbar + main content area.
      5. `apps/web/app/components/shell/Sidebar.tsx` — nav links using `<Link>` from
         react-router (NOT plain `<a>`). Conditionally shows admin-only items based on
         user.role. Collapses on mobile.
      6. `apps/web/app/components/shell/Topbar.tsx` — school name, current user, notification
         bell (links to /app/notifications), logout button.
      7. `apps/web/app/components/shell/MobileNav.tsx` — Radix Dialog with hamburger trigger.
      8. `apps/web/app/components/shell/NotificationBell.tsx` — shows unread notification
         count, links to /app/notifications.
      9. `apps/web/app/components/ui/` — Radix-wrapped primitives: Button, Dialog, Input,
