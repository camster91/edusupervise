  - id: devops-deploy
    title: 'devops-deploy: production Traefik snippet, secrets directory layout, backup script, runbooks'
    prompt: |
      Build production deployment tooling. Read spec section 13 (Deployment) carefully.

      Deliverables:

      1. `deploy/traefik/edusupervise.yml` — Traefik dynamic config for production:
         router rule, entrypoint, TLS certresolver=letsencrypt, service pointing at the
         web container. Add comment that this is loaded by the Traefik dynamic config
         provider on the VPS (matches existing Traefik v3.2 setup on vps.ashbi.ca).
      2. `deploy/backup.sh` — runs `pg_dump -Fc edusupervise > /data/backups/edusupervise-$(date +%F).dump`,
         rsync to offsite, retain 30 daily + 12 monthly. Reads DATABASE_URL from env.
      3. `deploy/install.sh` — one-shot install on a fresh VPS: creates /root/edusupervise-secrets/,
         prompts for each secret value, writes /root/edusupervise-secrets/.env, runs
         `docker compose up -d --build`, runs migrations, prints success.
      4. `deploy/healthcheck.sh` — bash equivalent of /api/health for cron monitoring.
      5. `docs/runbooks/restore.md` — step-by-step restore procedure from a pg_dump file.
         Includes the role-recreate step (roles live in init scripts, not in pg_dump).
      6. `docs/runbooks/rotate-secrets.md` — how to rotate STRIPE_SECRET_KEY,
         RESEND_API_KEY, TWILIO_AUTH_TOKEN, BETTER_AUTH_SECRET, SESSION_SECRET without
         losing sessions.
      7. `docs/runbooks/scale.md` — how to add a second worker container or move to a
         larger VPS. Includes Postgres tuning for 16GB host.
      8. `docs/runbooks/incident-debug.md` — common issues: "reminders not firing" (check
         heartbeat, outbox flusher, BullMQ stalled jobs), "RLS leak suspected" (verify
         FORCE ROW LEVEL SECURITY, check that app uses runtime role for web), "Stripe
         webhook not processed" (check stripe_events table for the event.id).

      Verification: scripts have bash -e and set -u, install.sh is idempotent (can re-run
      safely), all runbooks are concrete enough to follow without tribal knowledge.

      Stop condition: install.sh + backup.sh + restore.md are tested in a local dry-run
      against a throwaway Postgres.
