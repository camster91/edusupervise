  - id: final-integration
    title: 'final integration: E2E smoke on production deploy + 21 acceptance criteria'
    role: verify-as-task
    prompt: |
      Final integration check. Run the full Tier 1 acceptance criteria from spec section
      19 against the production deploy at https://edusupervise.ashbi.ca.

      For each of the 21 acceptance criteria, run the verification step and report PASS/FAIL
      with evidence (curl output, test result, screenshot, log line).

      The 21 criteria (from spec section 19):

      1. All 19 spec sections have shipped code (file inventory check)
      2. Three Postgres roles exist with documented grants; FORCE RLS on every tenant table
      3. Integration test: user from school A cannot read/write school B's rows on every
         tenant table
      4. Integration test: worker job with missing schoolId is rejected before any DB write
      5. Integration test: Stripe webhook fired twice with same event.id results in
         exactly one state change
      6. Integration test: CSRF rejects cross-origin POST
      7. Integration test: plan limit hit returns 403 with plan_limit_exceeded body shape
      8. Integration test: Pro→Free downgrade sets plan_downgrade_pending_to, exports
         audit log available, retention held for 7 days
      9. pnpm test passes with >=70% coverage on lib/ and server/
      10. pnpm test:e2e passes on the smoke scenario
      11. Deployed to vps.ashbi.ca, accessible at https://edusupervise.ashbi.ca
      12. Smoke test on production: signup -> assign duty -> create reminder -> receive email
      13. Audit log shows every action in the smoke flow
      14. Stripe test-mode checkout upgrades a trial school to Pro
      15. Backups verified: dump a fresh DB, restore to a clean Postgres, login works
      16. Heartbeat table populated by worker; /api/health reports degraded when worker
          is killed
      17. Integration test: cycle math returns correct cycle_day for school-year-edge,
          leap-year, and year-boundary dates
      18. Integration test: school-year rollover (preview + apply + commit + audit_log
          entry) succeeds end-to-end
      19. Integration test: audit_log retention cron prunes rows beyond per-plan retention
      20. Notifications table populated when reminders fail; user can mark read via UI
      21. No TODO/FIXME in shipped Tier 1 code (grep -r 'TODO\|FIXME' apps/ packages/
          db/ worker/ — confirm zero hits)

      For criterion 12 (production smoke), execute the full flow with a fresh school:
      - POST /auth/signup with new school + admin
      - Log in
      - POST /api/duties to create a duty
      - POST /api/assignments to assign the admin user
      - POST /api/reminders to create a 1-minute-before reminder
      - Wait 90s, then check /api/notifications + /api/audit for the dispatch log
      - Confirm an actual email was received (the test admin email)

      Report PASS/FAIL for each criterion with one line of evidence.

      Stop condition: report written to deliverable.md with PASS counts and any FAIL
      reasons. Plan complete when all 21 PASS (or Cameron accepts the gap list).
    assigned_to: verifier
    depends_on: [foundation, db-schema, auth-rls, billing, worker, frontend-shell, frontend-duties, frontend-reminders, frontend-admin, devops-deploy]
    max_retries: 1
