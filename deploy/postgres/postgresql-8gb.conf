# postgresql-8gb.conf
#
# Drop-in override of the postgres:16-alpine defaults for an 8 GB host.
# This is the spec minimum (1-3 schools) — sufficient for the first
# customer but not for sustained 20+ school load.
#
# Usage:
#   sudo cp deploy/postgres/postgresql-8gb.conf /data/postgres/postgresql.conf
#   sudo chown 999:999 /data/postgres/postgresql.conf  # postgres user in container
#   sudo docker compose -f docker/docker-compose.yml restart postgres
#
# Notes:
# - shared_buffers at 1 GB ≈ 12.5% of RAM (the conservative end of the
#   Postgres guidance for an 8 GB host; raising it requires dropping
#   work_mem to avoid OOM under load).
# - work_mem is per-operation. With max_connections=100 and a few heavy
#   sorts running in parallel, peak memory could spike. Watch
#   `docker stats edusupervise-postgres-1` for a day after a change;
#   lower work_mem to 8 MB if you see OOMs.
# - effective_cache_size is a HINT to the planner, not a hard limit.
#   It tells Postgres "this much RAM is available for caching." 3 GB
#   on an 8 GB host is conservative.
# - logging the slow-query threshold at 500 ms keeps the log small but
#   surfaces the queries that actually matter for a small DB.
#
# See docs/runbooks/scale.md for the 16 GB / 32 GB variants.

# ---- Memory ----
shared_buffers = 1GB
work_mem = 16MB
maintenance_work_mem = 256MB
effective_cache_size = 3GB
wal_buffers = 16MB

# ---- Connections ----
max_connections = 100

# ---- Storage (NVMe) ----
random_page_cost = 1.1
effective_io_concurrency = 200

# ---- WAL ----
min_wal_size = 512MB
max_wal_size = 2GB
checkpoint_completion_target = 0.9

# ---- Planner ----
default_statistics_target = 100

# ---- Logging ----
log_min_duration_statement = 500   # log queries slower than 500ms
log_lock_waits = on
log_temp_files = 0                 # log every temp file (catches work_mem under-runs)

# ---- Autovacuum (Postgres defaults are too passive for our audit_log growth) ----
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025
autovacuum_vacuum_cost_limit = 1000