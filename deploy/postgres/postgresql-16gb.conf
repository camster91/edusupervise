# postgresql-16gb.conf
#
# Drop-in override of the postgres:16-alpine defaults for a 16 GB host.
# This is the spec recommendation for "20+ schools" per spec section 13.
#
# Usage:
#   sudo cp deploy/postgres/postgresql-16gb.conf /data/postgres/postgresql.conf
#   sudo chown 999:999 /data/postgres/postgresql.conf  # postgres user in container
#   sudo docker compose -f docker/docker-compose.yml restart postgres
#
# Walkthrough of the doubling from the 8 GB profile:
# - shared_buffers 1 GB -> 4 GB (25% of RAM, the Postgres sweet spot).
# - work_mem 16 MB -> 32 MB. Per-operation, not per-query — with
#   max_connections=200, peak memory can spike if many heavy sorts run
#   concurrently. Watch `docker stats edusupervise-postgres-1` and
#   drop to 16 MB if OOMs appear.
# - maintenance_work_mem 256 MB -> 1 GB. Makes CREATE INDEX and VACUUM
#   much faster; uses 1 GB at peak. Schedule big index builds for
#   off-hours if the host is already busy.
# - max_connections 100 -> 200. Doubles headroom for additional worker
#   containers (see docs/runbooks/scale.md option 1).
# - min_wal_size / max_wal_size doubled to match the new shared_buffers.
# - default_statistics_target 100 -> 200. Better query plans at a
#   small cost in stats-collection time. Worth it once table sizes grow.
# - log_min_duration_statement 500 ms -> 250 ms. More verbose but
#   surfaces borderline-slow queries that would hide on the smaller host.
#
# See docs/runbooks/scale.md for the 32 GB variant (Tier 2).

# ---- Memory ----
shared_buffers = 4GB
work_mem = 32MB
maintenance_work_mem = 1GB
effective_cache_size = 12GB
wal_buffers = 16MB

# ---- Connections ----
max_connections = 200

# ---- Storage (NVMe) ----
random_page_cost = 1.1
effective_io_concurrency = 200

# ---- WAL ----
min_wal_size = 1GB
max_wal_size = 4GB
checkpoint_completion_target = 0.9

# ---- Planner ----
default_statistics_target = 200

# ---- Logging ----
log_min_duration_statement = 250   # log queries slower than 250ms
log_lock_waits = on
log_temp_files = 0                 # log every temp file (catches work_mem under-runs)

# ---- Autovacuum ----
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025
autovacuum_vacuum_cost_limit = 1000