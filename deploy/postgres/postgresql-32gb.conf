# postgresql-32gb.conf
#
# Drop-in override of the postgres:16-alpine defaults for a 32 GB host.
# Tier 2 target — only needed if the 16 GB host is exhausted
# (audit_log retention beyond per-plan limits, sustained >5 workers,
# or you're running analytics-heavy reports).
#
# Usage:
#   sudo cp deploy/postgres/postgresql-32gb.conf /data/postgres/postgresql.conf
#   sudo chown 999:999 /data/postgres/postgresql.conf  # postgres user in container
#   sudo docker compose -f docker/docker-compose.yml restart postgres
#
# Scale-up vs 16 GB:
# - shared_buffers 4 GB -> 8 GB (25% of RAM, the Postgres sweet spot).
# - work_mem 32 MB -> 64 MB. PER-OPERATION. With max_connections=300
#   and a heavy concurrent load, peak memory is significant — watch
#   `docker stats edusupervise-postgres-1` for a week after a change.
# - maintenance_work_mem 1 GB -> 2 GB. CREATE INDEX and VACUUM are
#   now I/O-bound rather than memory-bound.
# - max_connections 200 -> 300. The headroom for additional worker
#   containers (see docs/runbooks/scale.md option 1).
#
# See docs/runbooks/scale.md for the full 32 GB walkthrough.

# ---- Memory ----
shared_buffers = 8GB
work_mem = 64MB
maintenance_work_mem = 2GB
effective_cache_size = 24GB
wal_buffers = 16MB

# ---- Connections ----
max_connections = 300

# ---- Storage (NVMe) ----
random_page_cost = 1.1
effective_io_concurrency = 200

# ---- WAL ----
min_wal_size = 2GB
max_wal_size = 8GB
checkpoint_completion_target = 0.9

# ---- Planner ----
default_statistics_target = 200

# ---- Logging ----
log_min_duration_statement = 250
log_lock_waits = on
log_temp_files = 0

# ---- Autovacuum ----
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.025
autovacuum_vacuum_cost_limit = 2000