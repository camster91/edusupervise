<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 769" width="1280" height="769" role="img" aria-label="Upwork portfolio thumbnail — EduSupervise: school duty scheduling SaaS, 12 hours to 90 minutes per week">
  <title>EduSupervise — School Duty Scheduling SaaS</title>
  <desc>Upwork portfolio thumbnail. Off-white surface with deep navy type and amber accent. Project name, hero stat showing weekly scheduling time reduction, calendar grid data viz.</desc>

  <defs>
    <linearGradient id="bgLight2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <linearGradient id="beforeFill" x1="0" y1="0" x2="0" y2="1">
