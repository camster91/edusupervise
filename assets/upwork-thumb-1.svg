  <text x="64" y="448" class="sans" font-size="22" font-weight="500" fill="#475569">Phone-call CTA wired to every service page.</text>

  <!-- Hero stat block -->
  <g transform="translate(64, 504)">
    <!-- Pill bg -->
    <rect x="0" y="0" width="580" height="180" rx="16" fill="#0F172A"/>

    <!-- Eyebrow inside dark card -->
    <g class="sans" transform="translate(32, 36)">
