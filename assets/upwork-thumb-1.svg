<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 769" width="1280" height="769" role="img" aria-label="Upwork portfolio thumbnail — Joe's Heating &amp; Cooling: +47% phone-call conversions, custom WordPress build">
  <title>Joe's Heating &amp; Cooling — Custom WordPress + Conversion Lift</title>
  <desc>Upwork portfolio thumbnail. Off-white surface with deep navy type and amber accent. Project name, client, hero stat, 1-line outcome, sparkline data viz.</desc>

  <defs>
    <linearGradient id="bgLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>

    <!-- Thermal-gradient dot heatmap (decorative, right panel) -->
    <linearGradient id="thermal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#F59E0B" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0.95"/>
    </linearGradient>

    <linearGradient id="sparkFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E2E8F0" stroke-width="0.5"/>
    </pattern>

    <style>
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", system-ui, sans-serif; }
      .mono { font-family: ui-monospace, "SF Mono", "Menlo", "Consolas", monospace; }
    </style>
  </defs>

  <!-- Surface -->
  <rect width="1280" height="769" fill="url(#bgLight)"/>
  <rect width="1280" height="769" fill="url(#grid)"/>

  <!-- Top brand bar -->
  <g class="sans" transform="translate(64, 56)">
    <rect x="0" y="0" width="40" height="40" rx="8" fill="#0F172A"/>
    <text x="20" y="27" font-size="20" font-weight="800" fill="#F59E0B" text-anchor="middle">C</text>
    <text x="56" y="18" font-size="12" font-weight="700" letter-spacing="2.4" fill="#64748B">CAMERON ASHLEY</text>
    <text x="56" y="36" font-size="13" font-weight="500" fill="#94A3B8">WordPress · Elementor · Conversion-focused builds</text>
  </g>

  <!-- Right-side project tag -->
  <g class="sans" transform="translate(1216, 64)">
