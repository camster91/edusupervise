name: CI Build

# Build-only workflow: verifies the pnpm monorepo builds cleanly.
# Triggered on push to default branch and on PRs targeting it. Manual dispatch available.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (if configured)
        run: |
          if grep -q '"lint"' package.json; then
            pnpm run lint
          else
            echo "No lint script found, skipping."
          fi
        continue-on-error: true

      - name: Type check (if configured)
        run: |
          if grep -q '"typecheck"\|"type-check"\|"tsc"' package.json; then
            pnpm run typecheck || pnpm run type-check || pnpm exec tsc --noEmit
          else
            echo "No typecheck script found, skipping."
          fi
        continue-on-error: true

      - name: Unit tests
        run: pnpm test
        continue-on-error: true

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production
          CI: true